<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 80" width="340" height="80">
  <!-- Permitr lockup: § seal + wordmark. Paper/ink/navy — the audit-document brand. -->
  <circle cx="40" cy="40" r="30" fill="#fdfcf9" stroke="#24344d" stroke-width="3.5"/>
  <circle cx="40" cy="40" r="24.5" fill="none" stroke="#24344d" stroke-width="1.25"/>
  <text x="40" y="41.5" text-anchor="middle" dominant-baseline="central"
        font-family="Charter, Georgia, 'Times New Roman', serif"
        font-size="34" font-weight="700" fill="#24344d">§</text>
  <text x="86" y="49" font-family="Charter, Georgia, 'Times New Roman', serif"
        font-size="38" font-weight="700" letter-spacing="0.5" fill="#1a1a1c">Permitr</text>
  <text x="88" y="66" font-family="Charter, Georgia, 'Times New Roman', serif"
        font-size="11" letter-spacing="2.2" fill="#5c5c66">CERTIFY THE COIN</text>
